defaults:
  pixels_per_meter: 25.0
  speed_limit_kmh: 60.0
  speed_tolerance_kmh: 0.0
  severe_speed_delta_kmh: 20.0
  speed_reset_delta_kmh: 5.0
  stopped_speed_threshold_kmh: 3.0
  stopped_duration_seconds: 20
  stopped_resume_speed_kmh: 8.0
  state_ttl_seconds: 120
  max_motorcycle_riders: 2
  rider_association_window_seconds: 2.0
  rider_horizontal_margin_ratio: 0.35
  rider_upper_margin_ratio: 0.75
  rider_lower_margin_ratio: 0.25
  stop_line_min_speed_kmh: 5.0
  pedestrian_crossing_min_speed_kmh: 5.0
  pedestrian_crossing_window_seconds: 2.0
  crossing_min_presence_seconds: 0.75
  crossing_min_observations: 2
  crossing_vehicle_min_displacement_px: 12.0
  zones: []
  counting_lines: []

cameras:
  - id: recam_01
    url: recamera-node-red
    location: reCamera_192.168.0.100
    target_fps: 5
    live_feed_type: recamera_ws
    live_feed_url: ws://192.168.0.100:8090
    pixels_per_meter: 25.0
    speed_limit_kmh: 50.0
    speed_tolerance_kmh: 2.0
    speed_history_size: 8
    speed_max_kmh: 80.0
    speed_min_time_delta_seconds: 0.2
    speed_smoothing_alpha: 0.35
    speed_outlier_mode: ignore

  - id: sample_video_01
    url: ../data/sample.mp4
    location: test_intersection
    target_fps: 15
    live_feed_type: preview
    preview_image_url: https://placehold.co/1280x720/png?text=sample_video_01
    pixels_per_meter: 22.5
    speed_limit_kmh: 50.0
    speed_tolerance_kmh: 2.0
    severe_speed_delta_kmh: 18.0
    stopped_duration_seconds: 15
    max_motorcycle_riders: 2
    stop_line_min_speed_kmh: 6.0
    pedestrian_crossing_min_speed_kmh: 8.0
    crossing_min_presence_seconds: 0.75
    crossing_min_observations: 2
    crossing_vehicle_min_displacement_px: 14.0
    counting_lines:
      - id: corridor_flow
        label: Corridor Flow
        points:
          - [220, 180]
          - [220, 360]
        min_crossing_distance_px: 8.0
        reset_distance_px: 14.0
        min_displacement_px: 14.0
        min_observations: 2
    zones:
      - id: school_crossing
        label: School Crossing
        type: polygon
        category: pedestrian_crossing
        points:
          - [180, 250]
          - [420, 250]
          - [420, 330]
          - [180, 330]
      - id: zebra_crossing_demo
        label: Zebra Crossing
        type: polygon
        category: zebra_crossing
        points:
          - [300, 260]
          - [520, 260]
          - [520, 340]
          - [300, 340]
      - id: north_stop_line
        label: North Stop Line
        type: polygon
        category: stop_line
        points:
          - [150, 220]
          - [450, 220]
          - [450, 245]
          - [150, 245]
